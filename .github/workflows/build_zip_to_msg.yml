name: Build ZIP to MSG EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --console --name "ZIP_to_MSG" zip_to_msg.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZIP_to_MSG
          path: dist/ZIP_to_MSG.exe
